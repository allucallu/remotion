name: Render Remotion Video

on:
  workflow_dispatch:
    inputs:
      composition_id:
        description: 'ID komposisi video (contoh: HelloWorld)'
        required: true
        default: 'HelloWorld'
      output_filename:
        description: 'Nama file output (contoh: output.mp4)'
        required: true
        default: 'output.mp4'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies for Remotion
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Render video
        run: |
          npx remotion render \
            ${{ github.event.inputs.composition_id }} \
            ${{ github.event.inputs.output_filename }}

      - name: Upload video as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: ${{ github.event.inputs.output_filename }}
          retention-days: 7
name: Render Broadcast News Pack
on: [workflow_dispatch]

jobs:
  render:
    name: Render Broadcast Assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        composition:
          - BreakingNewsBanner
          - LowerThirdCorporate
          - NewsTicker
          - LiveBroadcastBadge
          - WorldMapIntro
          - WeatherGraphicTemplate
          - CountdownTimerBroadcast
          - SportsScoreboardBug
          - ElectionResultBar
          - StudioTransitionWipe
          - SocialMediaOverlay
          - EmergencyAlertBroadcast
          - SplitScreenLayout
          - PressConferenceBackdrop
          - NewsIntroStinger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npx remotion render src/index.ts ${{ matrix.composition }} out/${{ matrix.composition }}.mp4 --gl=angle
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.composition }}
          path: out/${{ matrix.composition }}.mp4
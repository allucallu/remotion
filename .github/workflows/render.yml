name: Render Broadcast News Pack
on: [workflow_dispatch]

jobs:
  render-and-bundle:
    name: Render All & Bundle ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libasound2-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            xvfb

      - name: Bundle Remotion (once, shared)
        run: npx remotion bundle src/index.ts --out-dir bundle-out

      - name: Render all compositions
        run: |
          mkdir -p out
          COMPOSITIONS=(
            VariantNews
            VariantCorporate
            VariantCyberpunk
            VariantFluid
            VariantTicker
            VariantSports
            VariantWeather
            VariantElection
            VariantEmergency
            VariantSplit
          )
          for COMP in "${COMPOSITIONS[@]}"; do
            echo "▶ Rendering $COMP..."
            npx remotion render src/index.ts "$COMP" "out/${COMP}.mp4" --gl=swangle
            echo "✅ Done: $COMP"
          done

      - name: Create ZIP bundle
        run: |
          cd out
          zip -r ../TextlessBroadcastOverlayPack.zip *.mp4
          echo "=== ZIP contents ==="
          unzip -l ../TextlessBroadcastOverlayPack.zip
          echo "=== ZIP size ==="
          ls -lh ../TextlessBroadcastOverlayPack.zip

      - name: Upload TextlessBroadcastOverlayPack.zip
        uses: actions/upload-artifact@v4
        with:
          name: TextlessBroadcastOverlayPack
          path: TextlessBroadcastOverlayPack.zip
name: Render Remotion Video

on:
  workflow_dispatch:
    inputs:
      composition_id:
        description: 'ID komposisi (atau "ALL" untuk render semua loading)'
        required: true
        default: 'ALL'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Render single composition
        if: github.event.inputs.composition_id != 'ALL'
        run: |
          npx remotion render \
            ${{ github.event.inputs.composition_id }} \
            out/${{ github.event.inputs.composition_id }}.mp4

      - name: Render ALL compositions
        if: github.event.inputs.composition_id == 'ALL'
        run: |
          mkdir -p out
          for id in \
            SG-TriForce-White SG-TriForce-Gold \
            SG-Metatron-White SG-Metatron-Cyan \
            SG-StarTetra-White SG-StarTetra-Gold \
            SG-Vesica-White SG-Vesica-Purple \
            SG-Golden-White SG-Golden-Gold \
            NH-DoubleHelix-White NH-DoubleHelix-Cyan \
            NH-AtomBohr-White NH-AtomBohr-Gold \
            NH-Crystal-White NH-Crystal-Cyan \
            NH-Nebula-White NH-Nebula-Purple \
            NH-Torus-White NH-Torus-Gold
          do
            echo "Rendering $id..."
            npx remotion render $id out/$id.mp4
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loading-animations
          path: out/
          retention-days: 7
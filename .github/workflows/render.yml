name: Render Remotion Video

on:
  workflow_dispatch:
    inputs:
      composition_id:
        description: 'ID komposisi (contoh: SE-HeartBurst) atau "ALL" untuk render semua'
        required: true
        default: 'ALL'
      codec:
        description: 'Format output'
        required: false
        default: 'h264'
        type: choice
        options:
          - h264
          - prores-4444

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 \
            libxshmfence1 libgles2 fonts-liberation

      # ─── RENDER SATU KOMPOSISI ──────────────────────────────────────
      - name: Render single composition
        if: github.event.inputs.composition_id != 'ALL'
        run: |
          mkdir -p out
          CODEC="${{ github.event.inputs.codec }}"
          ID="${{ github.event.inputs.composition_id }}"

          if [ "$CODEC" = "prores-4444" ]; then
            EXT="mov"
          else
            EXT="mp4"
          fi

          echo "▶ Rendering: $ID.$EXT"
          npx remotion render \
            --codec="$CODEC" \
            --log=verbose \
            "$ID" \
            "out/${ID}.${EXT}"

      # ─── RENDER SEMUA KOMPOSISI ─────────────────────────────────────
      - name: Render ALL compositions
        if: github.event.inputs.composition_id == 'ALL'
        run: |
          mkdir -p out

          CODEC="${{ github.event.inputs.codec }}"
          if [ "$CODEC" = "prores-4444" ]; then
            EXT="mov"
          else
            EXT="mp4"
          fi

          # Daftar lengkap semua 20 komposisi Batch 2
          COMPOSITIONS=(
            # Module 1 — Terminal UI & Hacker
            "TU-BootSequence"
            "TU-NeuralNetwork"
            "TU-DataTransfer"
            "TU-FatalCrash"
            "TU-PasswordCracker"
            # Module 2 — News Tickers & Peringatan Siaran
            "NT-BreakingNews"
            "NT-EmergencyAlert"
            "NT-TopSecretWipe"
            "NT-CyberLockdown"
            "NT-CrimeScene"
            # Module 3 — Retro Kamera & Efek VHS
            "RV-Camcorder90s"
            "RV-LowBattery"
            "RV-GlitchNoSignal"
            "RV-VCRFastForward"
            "RV-SecurityCCTV"
            # Module 4 — Hamparan Siaran Olahraga
            "SO-MatchTimer"
            "SO-VARScreen"
            "SO-InjuryTime"
            "SO-MsStopwatch"
            "SO-MatchBanners"
          )

          TOTAL=${#COMPOSITIONS[@]}
          CURRENT=0
          FAILED=()

          for ID in "${COMPOSITIONS[@]}"; do
            CURRENT=$((CURRENT + 1))
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "▶ [$CURRENT/$TOTAL] Rendering: $ID.$EXT"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            npx remotion render \
              --codec="$CODEC" \
              "$ID" \
              "out/${ID}.${EXT}" \
            || {
              echo "❌ GAGAL: $ID"
              FAILED+=("$ID")
            }

            echo "✅ Selesai: $ID"
          done

          echo ""
          echo "══════════════════════════════════════════"
          echo "RENDER SELESAI: $TOTAL komposisi"
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "❌ Yang gagal:"
            for F in "${FAILED[@]}"; do echo "   - $F"; done
            exit 1
          else
            echo "✅ Semua berhasil!"
          fi

      # ─── TAMPILKAN DAFTAR FILE OUTPUT ───────────────────────────────
      - name: List output files
        if: always()
        run: |
          echo "📁 File hasil render:"
          ls -lh out/ 2>/dev/null || echo "(tidak ada output)"

      # ─── UPLOAD KE GITHUB ARTIFACTS ─────────────────────────────────
      - name: Upload render artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: overlays-batch2-4k-${{ github.event.inputs.codec }}
          path: out/
          retention-days: 30
          if-no-files-found: warn